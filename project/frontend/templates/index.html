<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Matcher - Search</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #333; margin-bottom: 1.5rem; }
        p { color: #666; margin-bottom: 2rem; }
        form { display: flex; flex-direction: column; gap: 1rem; }
        input[type="text"] { padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        button { background-color: #007bff; color: white; padding: 0.8rem; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; transition: background-color 0.3s; }
        button:hover { background-color: #0056b3; }
        .error { color: #dc3545; background-color: #f8d7da; padding: 0.8rem; border-radius: 4px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AI Resume Matcher</h1>
        <p>Find the best candidates using semantic search powered by Endee Vector Database.</p>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form action="/search" method="post">
            <input type="text" name="query" placeholder="e.g. Senior Python Developer with React..." required autofocus>
            <button type="submit">Search Resumes</button>
        </form>

        <hr style="margin: 2rem 0; border: 0; border-top: 1px solid #eee;">

        <div class="upload-section">
            <h3 style="color: #333; margin-bottom: 1rem;">📤 Upload New Resume</h3>
            <form action="/upload" method="post" enctype="multipart/form-data">
                <input type="file" name="resume" accept=".pdf,.txt" required style="margin-bottom: 1rem;">
                <button type="submit" style="background-color: #28a745;">Index Resume</button>
            </form>
        </div>
    </div>
</body>
</html>
